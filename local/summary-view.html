<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>vmksft summary</title>
  <link rel="stylesheet" href="../assets/dashboard.css">
  <link rel="stylesheet" href="../assets/summary-view.css">
</head>
<body>
  <div class="shell">
    <header class="hero">
      <div>
        <p class="eyebrow">Local NIPA vmksft summary</p>
        <h1 id="summary-title">Loading summary</h1>
        <p id="summary-subtitle" class="subtitle">Fetching summary.json and the final results detail file.</p>
      </div>
      <nav id="summary-links" class="hero-links"></nav>
    </header>

    <section class="panel">
      <h2>Run Metadata</h2>
      <div id="summary-meta" class="meta-grid"></div>
    </section>

    <section class="panel">
      <h2>Result Totals</h2>
      <div id="summary-stats" class="stats"></div>
      <p id="summary-note" class="note">Waiting for result data.</p>
    </section>

    <section class="panel">
      <h2>Per-Test Results</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Group</th>
              <th>Test</th>
              <th>Result</th>
              <th>Retry</th>
              <th>Time</th>
              <th>Links</th>
            </tr>
          </thead>
          <tbody id="summary-results-body">
            <tr><td colspan="6" class="table-empty">Waiting for final results.</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>
  <script src="../assets/summary-view.js"></script>
</body>
</html>
