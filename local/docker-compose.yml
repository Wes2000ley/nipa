services:
  vmksft-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: nipa-vmksft:fedora44
    init: true
    privileged: true
    restart: unless-stopped
    working_dir: /workspace/local
    environment:
      NIPA_KERNEL_TREE: /workspace/kernel
      NIPA_STATE_DIR: /workspace/local/state
      NIPA_WEB_PORT: ${NIPA_WEB_PORT:-8888}
      NIPA_PUBLIC_HOST: ${NIPA_PUBLIC_HOST:-localhost}
      NIPA_VMKSFT_TARGETS: ${NIPA_VMKSFT_TARGETS:-}
      NIPA_VMKSFT_SKIP_TESTS: ${NIPA_VMKSFT_SKIP_TESTS:-}
    ports:
      - "${NIPA_WEB_PORT:-8888}:${NIPA_WEB_PORT:-8888}"
    volumes:
      - .:/workspace/local:ro
      - ${NIPA_STATE_DIR:-./state}:/workspace/local/state
      - ${NIPA_KERNEL_TREE:-/tmp/nipa-missing-kernel-tree}:/workspace/kernel:ro
    command:
      - /bin/bash
      - -lc
      - |
        exec python3 /workspace/local/bin/vmksft_service.py
