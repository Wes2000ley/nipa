<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Local vmksft Result Log</title>
    <link rel="shortcut icon" href="/favicon-contest.png" type="image/png" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    <script src="./assets/nipa.js"></script>
    <script src="./assets/contest.js"></script>
    <link rel="stylesheet" href="./assets/nipa.css">
    <style>
      .column {
        flex: max-content;
      }
    </style>
</head>
<body onload="do_it();">
<div id="sitemap"></div>
<div class="row-small">
    <fieldset>
      <legend>Filtering:</legend>
      <input type="hidden" id="test" value="" />

      <div class="row-small">
          <div class="column-small">
              <div>
                  <input type="checkbox" id="pass" name="fl-pw" disabled checked />
                  <label for="pass">Pass</label>
              </div>
              <div>
                  <input type="checkbox" id="skip" name="fl-pw" disabled checked />
                  <label for="skip">Skip</label>
              </div>
              <div>
                  <input type="checkbox" id="warn" name="fl-pw" disabled checked />
                  <label for="warn">Warn</label>
              </div>
              <div>
                  <input type="checkbox" id="fail" name="fl-pw" disabled checked />
                  <label for="fail">Fail</label>
              </div>
          </div>
          <div class="column-small">
              <div>
                  <label for="branch">Branch</label>
                  <select id="branch" name="fl-pw" disabled>
                      <option value="">-- all --</option>
                  </select>
              </div>
          </div>
          <div class="column-small">
              <span id="filter-info"></span>
              <br /><br />
              <p>
                  <a href="#" id="update-url-button" class="nipa-button">Update URL</a>
              </p>
          </div>
      </div>
      <div class="row-small">
          <span id="fl-warn-box" style="color: red">Loading...</span>
      </div>
      <div class="row-small">
          <span id="refresh-status" aria-live="polite" style="min-height: 1em; color: #666;"></span>
      </div>
    </fieldset>
    <div class="box">
        <p id="open-full-page" style="display: none;">
            <a href="#" id="open-full-page-link" class="nipa-button">Open full page</a>
        </p>
        <p>
            <a href="./contest.html" class="nipa-button">Home</a>
        </p>
    </div>
</div>
<div class="row">
    <div class="column">
        <table id="results">
            <tr>
                <th>Date</th>
                <th>Branch</th>
                <th>Remote</th>
                <th>Executor</th>
                <th>Group</th>
                <th>Test</th>
                <th>Result</th>
                <th>Retry</th>
                <th>Time</th>
                <th colspan="3">Links</th>
            </tr>
        </table>
    </div>
</div>
</body>
</html>
